version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
  settings:
    revive:
      rules:
        - name: package-comments
        - name: exported
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
