name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - run: go build ./...
      - run: go test ./...
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      # golangci-lint v2 requires action v7 (v6 only supports lint v1, whose
      # "latest" binary is Go 1.24-built and fails on go.mod's 1.25 target and
      # the v2 .golangci.yml). v2.12.2 is Go 1.25-built and reads the v2 config.
      - uses: golangci/golangci-lint-action@v7.0.1
        with:
          version: v2.12.2
