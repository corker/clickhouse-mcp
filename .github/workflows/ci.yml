name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - run: go build ./...
      - run: go test ./...
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v6
        with:
          # Pin an explicit v2 build: the action's "latest" resolves to a stale
          # v1 binary (v1.64.8, built with Go 1.24) that both fails on go.mod's
          # 1.25 target and cannot read the v2 .golangci.yml. v2.12.2 is built
          # with Go 1.25 and reads the v2 config format.
          version: v2.12.2
